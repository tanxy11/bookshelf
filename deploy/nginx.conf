server {
    listen 80;
    server_name book.tanxy.net;
    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name book.tanxy.net;

    root /var/www/book.tanxy.net;
    index index.html;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/book.tanxy.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/book.tanxy.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # API — proxy to FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Cache static assets aggressively; cache books.json briefly
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /data/books.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback — serve index.html for any unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
