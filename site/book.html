<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book — Xinyu's Bookshelf</title>
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6efe7; --bg-wash: #f1e5d8;
      --surface: rgba(255, 252, 247, 0.92); --surface-strong: #fffaf5;
      --border: rgba(121, 94, 72, 0.11); --border-strong: rgba(121, 94, 72, 0.2);
      --muted: #84766d; --text: #342922;
      --accent: #9c7054; --accent-deep: #785641; --accent-soft: #f3e3d5;
      --olive: #68735d; --olive-soft: #e8edde;
      --danger: #9b6f6a; --danger-soft: rgba(155, 111, 106, 0.11);
      --question-accent: #6f7888; --question-soft: #e7eaf1;
      --star-on: #c79054; --star-off: #dccfbf;
      --shadow-soft: 0 18px 46px rgba(70, 52, 35, 0.06);
      --radius: 14px;
    }
    body {
      font-family: 'Alegreya Sans', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 249, 241, 0.9), transparent 38%),
        linear-gradient(180deg, #faf6f0 0%, var(--bg) 42%, #f1e8dc 100%);
      color: var(--text); font-size: 15.5px; line-height: 1.66; min-height: 100vh;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.38), transparent 28%),
        radial-gradient(circle at 84% 18%, rgba(121, 94, 72, 0.05), transparent 24%);
      opacity: 0.88;
    }
    a { color: var(--accent-deep); text-decoration: none; }
    a:hover { color: var(--accent); }

    .container {
      position: relative;
      z-index: 1;
      max-width: 740px;
      margin: 0 auto;
      padding: 24px;
    }
    .back { display: inline-block; margin-bottom: 20px; font-size: .92rem; color: var(--muted); font-weight: 500; }
    .back:hover { color: var(--accent-deep); }

    /* Hero */
    .hero {
      display: flex; gap: 24px; align-items: flex-start;
      padding: 24px; border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(249, 242, 234, 0.92)),
        var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft); position: relative;
    }
    .hero-cover {
      flex-shrink: 0; width: 120px; height: 180px;
      border-radius: 8px; overflow: hidden;
      background: var(--bg-wash); border: 1px solid var(--border);
    }
    .hero-cover img { width: 100%; height: 100%; object-fit: cover; }
    .hero-cover .placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 2rem;
    }
    .hero-info { flex: 1; min-width: 0; }
    .hero-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.92rem; font-weight: 600;
      line-height: 1.12; margin-bottom: 4px; color: rgba(52, 41, 34, 0.96);
    }
    .hero-author { font-size: 1.08rem; color: rgba(132, 118, 109, 0.96); margin-bottom: 10px; }
    .hero-meta { font-size: .97rem; color: var(--muted); margin-bottom: 12px; }
    .hero-meta .stars { color: var(--star-on); letter-spacing: 1px; }
    .hero-meta .star-off { color: var(--star-off); }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-pill {
      display: inline-block; padding: 5px 11px; border-radius: 999px;
      font-size: .82rem; border: 1px solid var(--border);
      background: rgba(255,255,255,0.92); color: var(--text);
    }
    .edit-link {
      position: absolute; top: 12px; right: 12px;
      font-size: .8rem; color: var(--muted);
    }
    .edit-link:hover { color: var(--accent-deep); }

    /* Review */
    .section { margin-top: 36px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.58rem; font-weight: 600;
      margin-bottom: 14px; color: rgba(52, 41, 34, 0.94);
    }
    .review-text {
      line-height: 1.5;
      font-size: 1.03rem;
      color: rgba(52, 41, 34, 0.96);
    }
    .review-text p { margin: 0 0 0.3em 0; }
    .review-text p:last-child { margin-bottom: 0; }
    .review-text blockquote {
      border-left: 3px solid rgba(122, 92, 62, 0.3);
      margin: 0.35em 0; padding: 0.1em 0.7em;
      color: rgba(52, 41, 34, 0.75);
    }
    .review-text ul, .review-text ol { margin: 0.15em 0; padding-left: 1.3em; }
    .review-text li { margin-bottom: 0; }
    .review-text code {
      background: rgba(122, 92, 62, 0.08); padding: 0.15em 0.35em;
      border-radius: 3px; font-size: 0.93em;
    }
    .review-text pre { background: rgba(122, 92, 62, 0.06); padding: 0.6em; border-radius: 6px; overflow-x: auto; margin: 0.3em 0; }
    .review-text pre code { background: none; padding: 0; }
    .review-text a { color: rgba(122, 92, 62, 0.85); text-decoration: underline; }
    .review-text h1, .review-text h2, .review-text h3 {
      font-family: 'Cormorant Garamond', serif; font-weight: 600;
      color: rgba(52, 41, 34, 0.94); margin: 0.5em 0 0.15em;
    }
    .review-text h1 { font-size: 1.2rem; }
    .review-text h2 { font-size: 1.12rem; }
    .review-text h3 { font-size: 1.05rem; }
    .review-text hr { border: none; border-top: 1px solid rgba(122, 92, 62, 0.18); margin: 0.7em 0; }
    .review-text strong { font-weight: 600; }
    .review-text em { font-style: italic; }

    /* Notes */
    .notes-empty { color: var(--muted); font-size: .97rem; }
    .note { margin-bottom: 24px; position: relative; }
    .note-label {
      display: inline-block; font-size: .76rem; font-weight: 600;
      letter-spacing: .03em; color: var(--accent-deep); margin-bottom: 6px;
    }
    .note-location {
      font-size: .8rem; color: var(--muted); margin-left: 8px; font-weight: 400;
      text-transform: none; letter-spacing: 0;
    }
    .note-content { white-space: pre-wrap; line-height: 1.72; font-size: .99rem; }
    .note-quote .note-content {
      border-left: 3px solid var(--accent); padding-left: 14px;
      font-style: italic; color: rgba(52, 41, 34, 0.94);
    }
    .note-disagreement .note-content {
      border-left: 3px solid var(--danger); padding-left: 14px;
    }
    .note-disagreement .note-label { color: var(--danger); }
    .note-connection .note-label { color: var(--olive); }
    .note-question .note-label { color: var(--question-accent); }
    .note-question .note-content {
      border-left: 3px solid var(--question-accent); padding-left: 14px;
    }

    /* Connection reference */
    .connected-reference {
      display: inline-flex; align-items: baseline; flex-wrap: wrap; gap: 6px;
      margin: 1px 0 10px; color: var(--olive); font-size: .88rem; line-height: 1.45;
    }
    .connected-reference::before {
      content: "";
      width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0;
      background: rgba(104, 115, 93, 0.34); transform: translateY(-1px);
    }
    .connected-reference-title {
      font-weight: 600;
      color: rgba(82, 74, 63, 0.92);
    }
    a.connected-reference {
      color: inherit; text-decoration: none;
    }
    a.connected-reference .connected-reference-title {
      border-bottom: 1px solid rgba(120, 86, 65, 0.2);
      transition: color .14s, border-color .14s;
    }
    a.connected-reference:hover .connected-reference-title {
      color: var(--accent-deep);
      border-color: rgba(120, 86, 65, 0.38);
    }
    .connected-reference-meta {
      font-size: .81rem; color: var(--muted);
    }
    .connected-reference-external {
      color: var(--accent-deep);
      border-bottom: 1px solid rgba(120, 86, 65, 0.16);
      text-decoration: none;
    }
    .connected-reference-external:hover {
      color: var(--accent);
      border-color: rgba(120, 86, 65, 0.34);
    }

    .note-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .note-tag {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: .68rem; background: var(--accent-soft); color: var(--accent-deep);
    }

    /* Note actions (edit/delete) */
    .note-actions {
      position: absolute; top: 0; right: 0;
      display: flex; gap: 8px;
    }
    .note-actions button {
      background: none; border: none; font: inherit; font-size: .72rem;
      color: var(--muted); cursor: pointer; padding: 2px 4px;
    }
    .note-actions button:hover { color: var(--accent-deep); }

    /* Note flash animation */
    @keyframes note-flash {
      0% { background: var(--olive-soft); }
      100% { background: transparent; }
    }
    .note-added { animation: note-flash 1.5s ease-out; }

    /* Add/Edit note form */
    #add-note-wrap:not(:empty) { margin-bottom: 24px; }

    .note-form-wrap {
      margin-top: 8px; padding: 20px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.95), rgba(248, 241, 233, 0.9)),
        var(--surface);
    }
    .note-form-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.18rem; font-weight: 600;
      margin-bottom: 12px;
    }
    .note-form { display: grid; gap: 12px; }
    .note-form label {
      font-size: .8rem; font-weight: 600;
      letter-spacing: .02em; color: var(--muted); display: block; margin-bottom: 4px;
    }
    .note-form select, .note-form input, .note-form textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px;
      background: rgba(255,255,255,0.88); font-size: .94rem; font-family: inherit; color: var(--text);
    }
    .note-form input:disabled {
      background: rgba(244, 238, 231, 0.9);
      color: var(--muted);
      cursor: not-allowed;
    }
    .note-form select:focus, .note-form input:focus, .note-form textarea:focus {
      outline: none; border-color: rgba(122,92,62,0.42); box-shadow: 0 0 0 3px rgba(122,92,62,0.08);
    }
    .note-form textarea { min-height: 80px; resize: vertical; }
    .note-form-row { display: flex; gap: 12px; align-items: flex-end; }
    .note-form-row > * { flex: 1; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 12px;
      font-family: inherit; font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .14s, transform .14s;
    }
    .btn-primary { background: var(--accent-deep); color: #fff; }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: rgba(255,255,255,0.8); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--accent-soft); }
    .btn-row { display: flex; gap: 10px; justify-content: flex-end; }

    .form-error {
      padding: 8px 12px; border-radius: 8px; font-size: .82rem;
      background: var(--danger-soft); color: var(--danger);
      border: 1px solid rgba(140,93,88,0.2);
    }

    /* Connection autocomplete */
    .connect-field { position: relative; }
    .connect-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
      background: var(--surface-strong); border: 1px solid var(--border-strong);
      border-radius: 10px; box-shadow: var(--shadow-soft); max-height: 200px; overflow-y: auto;
    }
    .connect-result {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      cursor: pointer; font-size: .85rem;
    }
    .connect-result:hover { background: var(--accent-soft); }
    .connect-result-author { color: var(--muted); font-size: .78rem; }
    .connect-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px; font-size: .82rem;
      border: 1px solid var(--border); background: rgba(255,255,255,0.88);
      margin-top: 6px;
    }
    .connect-chip button {
      background: none; border: none; font: inherit; color: var(--muted);
      cursor: pointer; padding: 0; line-height: 1;
    }
    .connect-chip button:hover { color: var(--accent-deep); }
    .connect-extra-field { margin-top: 10px; }
    .field-hint {
      margin-top: 4px;
      font-size: .76rem;
      color: var(--muted);
    }

    /* Tags toggle */
    .tags-toggle {
      background: none; border: none; font: inherit; font-size: .82rem;
      color: var(--accent-deep); cursor: pointer; padding: 0;
    }
    .tags-toggle:hover { text-decoration: underline; }

    /* Inline edit form (inside a note) */
    .note-edit-form { display: grid; gap: 10px; padding: 12px 0; }

    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: .98rem; }
    .hidden { display: none; }

    @media (max-width: 560px) {
      .hero { flex-direction: column; align-items: center; text-align: center; }
      .hero-tags { justify-content: center; }
      .edit-link { top: 8px; right: 8px; }
      .note-form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">&larr; Back to bookshelf</a>
  <div class="loading" id="loading">Loading book...</div>
  <div id="content" style="display:none">
    <div class="hero" id="hero"></div>
    <div class="section" id="review-section" style="display:none">
      <h2 class="section-title">Review</h2>
      <div class="review-text" id="review-text"></div>
    </div>
    <div class="section" id="notes-section">
      <h2 class="section-title" id="notes-title">Notes</h2>
      <div id="add-note-wrap"></div>
      <div id="notes-list"></div>
    </div>
  </div>
</div>

<script>
const AUTH_KEY = 'bookshelf_auth_token';
const isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const localApiPort = location.port === '8010' ? '8011' : '8001';
const apiBase = isLocalHost ? `http://127.0.0.1:${localApiPort}` : '';

const params = new URLSearchParams(location.search);
const bookId = params.get('id');

let allBooks = [];
let currentNotes = [];

function getToken() { return localStorage.getItem(AUTH_KEY) || ''; }
function isAuth() { return !!getToken(); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function stars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += i <= rating
      ? '<span class="stars">&#9733;</span>'
      : '<span class="star-off">&#9733;</span>';
  }
  return html;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function formatNoteDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

const RESERVED_SHELF_TAGS = new Set(['read', 'currently-reading', 'to-read']);

const PLACEHOLDERS = {
  thought: 'What stuck with you, what you\'d tell a friend...',
  quote: 'Enter the exact passage...',
  connection: 'How does this connect to the other work...',
  disagreement: 'What do you push back on and why...',
  question: 'What\'s left unresolved...',
};

// ── Hero ────────────────────────────────────────────────────────────────────

function renderHero(book) {
  const coverHtml = book.cover_url
    ? `<img src="${escHtml(book.cover_url)}" alt="${escHtml(book.title)}">`
    : '<div class="placeholder">&#128214;</div>';
  const metaParts = [];
  if (book.my_rating) metaParts.push(stars(book.my_rating));
  if (book.pages) metaParts.push(`${Number(book.pages).toLocaleString()} pages`);
  if (book.date_read) metaParts.push(`Read: ${formatDate(book.date_read)}`);
  const shelves = (book.shelves || []).filter(s => !RESERVED_SHELF_TAGS.has(s));
  const tagsHtml = shelves.length
    ? `<div class="hero-tags">${shelves.map(s => `<span class="tag-pill">${escHtml(s)}</span>`).join('')}</div>`
    : '';
  const editHtml = isAuth() && book.id
    ? `<a class="edit-link" href="edit.html?id=${book.id}">Edit</a>` : '';
  document.getElementById('hero').innerHTML = `
    ${editHtml}
    <div class="hero-cover">${coverHtml}</div>
    <div class="hero-info">
      <div class="hero-title">${escHtml(book.title)}</div>
      <div class="hero-author">${escHtml(book.author)}</div>
      <div class="hero-meta">${metaParts.join('  &middot;  ')}</div>
      ${tagsHtml}
    </div>
  `;
}

function renderReview(book) {
  const review = (book.my_review || '').trim();
  if (!review) return;
  if (typeof marked !== 'undefined') {
    marked.use({ breaks: true });
    document.getElementById('review-text').innerHTML = marked.parse(review);
  } else {
    document.getElementById('review-text').textContent = review;
  }
  document.getElementById('review-section').style.display = '';
}

// ── Notes rendering ─────────────────────────────────────────────────────────

function renderNoteHtml(note) {
  const typeClass = `note-${note.note_type}`;
  const typeLabels = {
    thought: 'Thought', quote: 'Quote', connection: 'Connection',
    disagreement: 'Disagreement', question: 'Question',
  };
  let label = typeLabels[note.note_type] || note.note_type;
  if (note.note_type === 'question') label = '? ' + label;

  const locationHtml = note.page_or_location
    ? `<span class="note-location">${escHtml(note.page_or_location)}</span>`
    : (note.note_type === 'thought' ? `<span class="note-location">${formatNoteDate(note.created_at)}</span>` : '');

  let connectedHtml = '';
  if (note.note_type === 'connection' && note.connected_book) {
    const cb = note.connected_book;
    connectedHtml = `
      <a class="connected-reference" href="book.html?id=${cb.id}">
        <span class="connected-reference-title">${escHtml(cb.title)}</span>
        <span class="connected-reference-meta">${escHtml(cb.author)}</span>
      </a>`;
  } else if (note.note_type === 'connection' && note.connected_label) {
    const externalTargetHtml = note.connected_url
      ? `<a class="connected-reference-external" href="${escAttr(note.connected_url)}" target="_blank" rel="noopener noreferrer">${escHtml(note.connected_label)}</a>`
      : `<span class="connected-reference-title">${escHtml(note.connected_label)}</span>`;
    connectedHtml = `
      <div class="connected-reference">
        ${externalTargetHtml}
      </div>`;
  }

  const tagsHtml = (note.tags && note.tags.length)
    ? `<div class="note-tags">${note.tags.map(t => `<span class="note-tag">${escHtml(t)}</span>`).join('')}</div>`
    : '';

  const actionsHtml = isAuth() ? `
    <div class="note-actions">
      <button data-edit-note="${note.id}">edit</button>
      <button data-delete-note="${note.id}">delete</button>
    </div>` : '';

  return `
    <div class="note ${typeClass}" data-note-id="${note.id}">
      ${actionsHtml}
      <div class="note-display">
        <div class="note-label">${label}${locationHtml}</div>
        ${connectedHtml}
        <div class="note-content">${escHtml(note.content)}</div>
        ${tagsHtml}
      </div>
    </div>`;
}

function updateNotesTitle() {
  const count = currentNotes.length;
  document.getElementById('notes-title').textContent = count ? `Notes (${count})` : 'Notes';
}

function renderNotes(notes) {
  currentNotes = notes;
  updateNotesTitle();
  if (!notes.length) {
    document.getElementById('notes-list').innerHTML =
      `<p class="notes-empty">No notes yet.${isAuth() ? ' Add your first note below.' : ''}</p>`;
    return;
  }
  document.getElementById('notes-list').innerHTML = notes.map(renderNoteHtml).join('');
}

// ── Note form builder (shared by add & edit) ────────────────────────────────

function buildNoteFormHtml(opts = {}) {
  const {
    noteType = 'thought',
    content = '',
    pageOrLocation = '',
    connectedId = null,
    connectedLabel = '',
    connectedUrl = '',
    connectedBook = null,
    tags = [],
    formId = 'add',
  } = opts;
  const prefix = `nf-${formId}`;
  const showConnect = noteType === 'connection';
  const chipLabel = connectedBook
    ? `${connectedBook.title} — ${connectedBook.author}`
    : '';
  const connectInputValue = chipLabel ? '' : connectedLabel;
  const connectUrlValue = chipLabel ? '' : connectedUrl;

  const connectedChipHtml = chipLabel
    ? `<div class="connect-chip" id="${prefix}-connect-chip">
        <span>${escHtml(chipLabel)}</span>
        <button type="button" data-clear-connect="${prefix}">&times;</button>
       </div>`
    : `<div class="connect-chip hidden" id="${prefix}-connect-chip"></div>`;

  return `
    <div class="note-form" data-form-prefix="${prefix}">
      <div>
        <label for="${prefix}-type">Type</label>
        <select id="${prefix}-type">
          <option value="thought"${noteType === 'thought' ? ' selected' : ''}>Thought</option>
          <option value="quote"${noteType === 'quote' ? ' selected' : ''}>Quote</option>
          <option value="connection"${noteType === 'connection' ? ' selected' : ''}>Connection</option>
          <option value="disagreement"${noteType === 'disagreement' ? ' selected' : ''}>Disagreement</option>
          <option value="question"${noteType === 'question' ? ' selected' : ''}>Question</option>
        </select>
      </div>
      <div>
        <label for="${prefix}-content">Note</label>
        <textarea id="${prefix}-content" placeholder="${escHtml(PLACEHOLDERS[noteType] || '')}">${escHtml(content)}</textarea>
      </div>
      <div class="note-form-row">
        <div>
          <label for="${prefix}-location">Page / Location</label>
          <input type="text" id="${prefix}-location" placeholder="p.147, ch.3, etc." value="${escAttr(pageOrLocation || '')}">
        </div>
      </div>
      <div class="connect-field${showConnect ? '' : ' hidden'}" id="${prefix}-connect-wrap">
        <label for="${prefix}-connect-input">Connect to</label>
        <input type="text" id="${prefix}-connect-input" placeholder="Search for a book or type another work..." autocomplete="off" value="${escAttr(connectInputValue || '')}">
        <input type="hidden" id="${prefix}-connect-id" value="${escAttr(connectedId || '')}">
        <div class="connect-results hidden" id="${prefix}-connect-results"></div>
        ${connectedChipHtml}
        <div class="connect-extra-field">
          <label for="${prefix}-connect-url">External link</label>
          <input type="url" id="${prefix}-connect-url" placeholder="https://example.com" value="${escAttr(connectUrlValue || '')}">
          <div class="field-hint">Optional for articles, films, music, and other off-site references.</div>
        </div>
      </div>
      <div>
        <button type="button" class="tags-toggle" id="${prefix}-tags-toggle">${tags.length ? 'Tags' : '+ Add tags'}</button>
        <div class="${tags.length ? '' : 'hidden'}" id="${prefix}-tags-wrap" style="margin-top:6px">
          <input type="text" id="${prefix}-tags" placeholder="comma-separated, e.g. systems-thinking, emergence" value="${escAttr(tags.join(', '))}">
        </div>
      </div>
      <div class="form-error hidden" id="${prefix}-error"></div>
    </div>`;
}

function getFormValues(prefix) {
  const noteType = document.getElementById(`${prefix}-type`).value;
  const content = document.getElementById(`${prefix}-content`).value.trim();
  const pageOrLocation = document.getElementById(`${prefix}-location`).value.trim() || null;
  const connectedId = document.getElementById(`${prefix}-connect-id`).value || null;
  const connectTextInput = document.getElementById(`${prefix}-connect-input`);
  const connectUrlInput = document.getElementById(`${prefix}-connect-url`);
  const hasInternalConnection = noteType === 'connection' && !!connectedId;
  const connectedLabel = noteType === 'connection' && !hasInternalConnection
    ? (connectTextInput.value.trim() || null)
    : null;
  const connectedUrl = noteType === 'connection' && !hasInternalConnection
    ? (connectUrlInput.value.trim() || null)
    : null;
  const tagsRaw = document.getElementById(`${prefix}-tags`).value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : null;

  return {
    note_type: noteType,
    content,
    page_or_location: pageOrLocation,
    connected_label: connectedLabel,
    connected_url: connectedUrl,
    connected_source_id: connectedId ? Number(connectedId) : null,
    tags: tags && tags.length ? tags : null,
  };
}

function showFormError(prefix, msg) {
  const el = document.getElementById(`${prefix}-error`);
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideFormError(prefix) {
  document.getElementById(`${prefix}-error`).classList.add('hidden');
}

// ── Add note form ───────────────────────────────────────────────────────────

function renderAddNoteForm() {
  if (!isAuth()) {
    document.getElementById('add-note-wrap').innerHTML = '';
    return;
  }
  document.getElementById('add-note-wrap').innerHTML = `
    <div class="note-form-wrap">
      <div class="note-form-title">Add a note</div>
      ${buildNoteFormHtml({ formId: 'add' })}
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-primary" id="add-note-btn">+ Add note</button>
      </div>
    </div>`;
  setupFormInteractions('nf-add');
}

// ── Form interactions (type change, autocomplete, tags toggle) ──────────────

function setupFormInteractions(prefix) {
  const typeSelect = document.getElementById(`${prefix}-type`);
  const contentEl = document.getElementById(`${prefix}-content`);
  const connectWrap = document.getElementById(`${prefix}-connect-wrap`);
  const connectInput = document.getElementById(`${prefix}-connect-input`);
  const connectUrlEl = document.getElementById(`${prefix}-connect-url`);
  const connectResults = document.getElementById(`${prefix}-connect-results`);
  const connectIdEl = document.getElementById(`${prefix}-connect-id`);
  const connectChip = document.getElementById(`${prefix}-connect-chip`);
  const tagsToggle = document.getElementById(`${prefix}-tags-toggle`);
  const tagsWrap = document.getElementById(`${prefix}-tags-wrap`);

  function syncConnectionMode() {
    const hasInternalConnection = !!connectIdEl.value;
    connectUrlEl.disabled = hasInternalConnection;
    if (hasInternalConnection) {
      connectUrlEl.value = '';
    }
  }

  // Type change → update placeholder + show/hide connect field
  typeSelect.addEventListener('change', () => {
    contentEl.placeholder = PLACEHOLDERS[typeSelect.value] || '';
    if (typeSelect.value === 'connection') {
      connectWrap.classList.remove('hidden');
    } else {
      connectWrap.classList.add('hidden');
    }
    syncConnectionMode();
  });

  // Auto-grow textarea
  contentEl.addEventListener('input', () => {
    contentEl.style.height = 'auto';
    contentEl.style.height = contentEl.scrollHeight + 'px';
  });

  // Tags toggle
  tagsToggle.addEventListener('click', () => {
    tagsWrap.classList.toggle('hidden');
    if (!tagsWrap.classList.contains('hidden')) {
      document.getElementById(`${prefix}-tags`).focus();
    }
  });

  // Connection autocomplete
  let searchTimeout;
  connectInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = connectInput.value.trim();
    if (q) {
      connectIdEl.value = '';
      connectChip.innerHTML = '';
      connectChip.classList.add('hidden');
      syncConnectionMode();
    }
    if (q.length < 2) { connectResults.classList.add('hidden'); return; }
    searchTimeout = setTimeout(() => {
      const matches = allBooks
        .filter(b => String(b.id) !== bookId &&
          (`${b.title} ${b.author}`.toLowerCase().includes(q.toLowerCase())))
        .slice(0, 8);
      if (!matches.length) { connectResults.classList.add('hidden'); return; }
      connectResults.innerHTML = matches.map(b =>
        `<div class="connect-result" data-book-id="${b.id}" data-book-title="${escAttr(b.title)}" data-book-author="${escAttr(b.author)}">
          <span>${escHtml(b.title)}</span>
          <span class="connect-result-author">${escHtml(b.author)}</span>
        </div>`
      ).join('');
      connectResults.classList.remove('hidden');
    }, 150);
  });

  connectResults.addEventListener('click', (e) => {
    const row = e.target.closest('.connect-result');
    if (!row) return;
    const id = row.dataset.bookId;
    const title = row.dataset.bookTitle;
    const author = row.dataset.bookAuthor;
    const chipLabel = `${title} — ${author}`;
    connectIdEl.value = id;
    connectInput.value = '';
    connectResults.classList.add('hidden');
    connectChip.innerHTML = `<span>${escHtml(chipLabel)}</span>
      <button type="button" data-clear-connect="${prefix}">&times;</button>`;
    connectChip.classList.remove('hidden');
    syncConnectionMode();
  });

  // Close results on outside click
  document.addEventListener('click', (e) => {
    if (!connectWrap.contains(e.target)) connectResults.classList.add('hidden');
  });

  syncConnectionMode();
}

// ── Event delegation ────────────────────────────────────────────────────────

document.addEventListener('click', async (e) => {
  // Clear connection chip
  const clearBtn = e.target.closest('[data-clear-connect]');
  if (clearBtn) {
    const prefix = clearBtn.dataset.clearConnect;
    document.getElementById(`${prefix}-connect-id`).value = '';
    document.getElementById(`${prefix}-connect-input`).value = '';
    const urlInput = document.getElementById(`${prefix}-connect-url`);
    if (urlInput) urlInput.disabled = false;
    const chip = document.getElementById(`${prefix}-connect-chip`);
    chip.innerHTML = '';
    chip.classList.add('hidden');
    return;
  }

  // Add note button
  if (e.target.id === 'add-note-btn') {
    await handleAddNote();
    return;
  }

  // Edit note
  const editBtn = e.target.closest('[data-edit-note]');
  if (editBtn) {
    handleEditStart(Number(editBtn.dataset.editNote));
    return;
  }

  // Delete note
  const deleteBtn = e.target.closest('[data-delete-note]');
  if (deleteBtn) {
    await handleDelete(Number(deleteBtn.dataset.deleteNote));
    return;
  }

  // Save edited note
  const saveBtn = e.target.closest('[data-save-note]');
  if (saveBtn) {
    await handleEditSave(Number(saveBtn.dataset.saveNote));
    return;
  }

  // Cancel edit
  const cancelBtn = e.target.closest('[data-cancel-edit]');
  if (cancelBtn) {
    handleEditCancel(Number(cancelBtn.dataset.cancelEdit));
    return;
  }
});

// ── Add note handler ────────────────────────────────────────────────────────

async function handleAddNote() {
  const prefix = 'nf-add';
  const values = getFormValues(prefix);
  hideFormError(prefix);

  if (!values.content) {
    showFormError(prefix, 'Note content cannot be empty.');
    return;
  }
  if (values.note_type === 'connection' && !values.connected_source_id && !values.connected_label) {
    showFormError(prefix, 'Choose a book or type what this note connects to.');
    return;
  }

  const btn = document.getElementById('add-note-btn');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    const resp = await fetch(`${apiBase}/api/books/${bookId}/notes`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(values),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Failed to add note.');

    // Fetch the new note to get full data (with connected_book enrichment)
    const notesResp = await fetch(`${apiBase}/api/books/${bookId}/notes`);
    const notesData = await notesResp.json();
    currentNotes = notesData.notes || [];
    renderNotes(currentNotes);

    // Flash the new note
    const newNoteEl = document.querySelector(`[data-note-id="${data.id}"]`);
    if (newNoteEl) newNoteEl.classList.add('note-added');

    // Reset form
    document.getElementById(`${prefix}-content`).value = '';
    document.getElementById(`${prefix}-location`).value = '';
    document.getElementById(`${prefix}-connect-id`).value = '';
    document.getElementById(`${prefix}-connect-input`).value = '';
    const connectUrl = document.getElementById(`${prefix}-connect-url`);
    connectUrl.value = '';
    connectUrl.disabled = false;
    document.getElementById(`${prefix}-tags`).value = '';
    const chip = document.getElementById(`${prefix}-connect-chip`);
    chip.innerHTML = '';
    chip.classList.add('hidden');
    document.getElementById(`${prefix}-type`).value = 'thought';
    document.getElementById(`${prefix}-content`).placeholder = PLACEHOLDERS.thought;
    document.getElementById(`${prefix}-connect-wrap`).classList.add('hidden');
    document.getElementById(`${prefix}-tags-wrap`).classList.add('hidden');
    document.getElementById(`${prefix}-tags-toggle`).textContent = '+ Add tags';
  } catch (err) {
    showFormError(prefix, err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '+ Add note';
  }
}

// ── Edit note handlers ──────────────────────────────────────────────────────

function handleEditStart(noteId) {
  const note = currentNotes.find(n => n.id === noteId);
  if (!note) return;

  const noteEl = document.querySelector(`[data-note-id="${noteId}"]`);
  if (!noteEl) return;

  const connectedBook = note.connected_book || null;

  noteEl.querySelector('.note-display').style.display = 'none';
  const actionsEl = noteEl.querySelector('.note-actions');
  if (actionsEl) actionsEl.style.display = 'none';

  // Insert inline edit form
  let editWrap = noteEl.querySelector('.note-edit-form');
  if (!editWrap) {
    editWrap = document.createElement('div');
    editWrap.className = 'note-edit-form';
    noteEl.appendChild(editWrap);
  }
  editWrap.innerHTML = `
    ${buildNoteFormHtml({
      formId: `edit-${noteId}`,
      noteType: note.note_type,
      content: note.content,
      pageOrLocation: note.page_or_location || '',
      connectedId: note.connected_source_id,
      connectedLabel: note.connected_label || '',
      connectedUrl: note.connected_url || '',
      connectedBook,
      tags: note.tags || [],
    })}
    <div class="btn-row">
      <button class="btn btn-secondary" data-cancel-edit="${noteId}">Cancel</button>
      <button class="btn btn-primary" data-save-note="${noteId}">Save</button>
    </div>`;
  editWrap.style.display = '';

  setupFormInteractions(`nf-edit-${noteId}`);
}

function handleEditCancel(noteId) {
  const noteEl = document.querySelector(`[data-note-id="${noteId}"]`);
  if (!noteEl) return;
  noteEl.querySelector('.note-display').style.display = '';
  const actionsEl = noteEl.querySelector('.note-actions');
  if (actionsEl) actionsEl.style.display = '';
  const editWrap = noteEl.querySelector('.note-edit-form');
  if (editWrap) editWrap.style.display = 'none';
}

async function handleEditSave(noteId) {
  const prefix = `nf-edit-${noteId}`;
  const values = getFormValues(prefix);
  hideFormError(prefix);

  if (!values.content) {
    showFormError(prefix, 'Note content cannot be empty.');
    return;
  }
  if (values.note_type === 'connection' && !values.connected_source_id && !values.connected_label) {
    showFormError(prefix, 'Choose a book or type what this note connects to.');
    return;
  }

  const saveBtn = document.querySelector(`[data-save-note="${noteId}"]`);
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try {
    const resp = await fetch(`${apiBase}/api/books/${bookId}/notes/${noteId}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(values),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Failed to update note.');

    // Re-fetch notes to get updated data
    const notesResp = await fetch(`${apiBase}/api/books/${bookId}/notes`);
    const notesData = await notesResp.json();
    currentNotes = notesData.notes || [];
    renderNotes(currentNotes);
  } catch (err) {
    showFormError(prefix, err.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }
}

// ── Delete note handler ─────────────────────────────────────────────────────

async function handleDelete(noteId) {
  if (!confirm('Delete this note?')) return;

  try {
    const resp = await fetch(`${apiBase}/api/books/${bookId}/notes/${noteId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Failed to delete note.');

    currentNotes = currentNotes.filter(n => n.id !== noteId);
    const noteEl = document.querySelector(`[data-note-id="${noteId}"]`);
    if (noteEl) noteEl.remove();
    updateNotesTitle();

    if (!currentNotes.length) {
      document.getElementById('notes-list').innerHTML =
        `<p class="notes-empty">No notes yet. Add your first note below.</p>`;
    }
  } catch (err) {
    alert(err.message);
  }
}

// ── Meta tags ───────────────────────────────────────────────────────────────

function updateMeta(book, noteCount) {
  document.title = `${book.title} — Xinyu's Bookshelf`;
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${book.title} — Xinyu's Bookshelf`);
  document.querySelector('meta[property="og:description"]').setAttribute('content',
    `${book.author} \u00b7 ${book.my_rating || 0} stars \u00b7 ${noteCount} notes`);
  if (book.cover_url) {
    document.querySelector('meta[property="og:image"]').setAttribute('content', book.cover_url);
  }
}

// ── Load page ───────────────────────────────────────────────────────────────

async function loadPage() {
  if (!bookId) {
    document.getElementById('loading').textContent = 'No book ID specified.';
    return;
  }

  try {
    const [booksResp, notesResp] = await Promise.all([
      fetch(`${apiBase}/api/books`),
      fetch(`${apiBase}/api/books/${bookId}/notes`),
    ]);

    const booksData = await booksResp.json();
    if (!booksResp.ok) throw new Error(booksData.detail || 'Failed to load books');

    allBooks = [
      ...(booksData.books.read || []),
      ...(booksData.books.currently_reading || []),
      ...(booksData.books.to_read || []),
    ];
    const book = allBooks.find(b => String(b.id) === bookId);
    if (!book) {
      document.getElementById('loading').textContent = 'Book not found.';
      return;
    }

    let notes = [];
    if (notesResp.ok) {
      const notesData = await notesResp.json();
      notes = notesData.notes || [];
    }

    renderHero(book);
    renderReview(book);
    renderNotes(notes);
    renderAddNoteForm();
    updateMeta(book, notes.length);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';
  } catch (err) {
    document.getElementById('loading').textContent = `Failed to load: ${err.message}`;
  }
}

loadPage();
</script>
